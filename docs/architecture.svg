<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img"
     aria-label="MAC package layer architecture: apps/server at the top depends on @nearform/mac, which depends on mac-github, mac-agent-workflows, and mac-slack, all of which depend on @nearform/mac/core, which depends on @mastra/core">
  <defs>
    <marker id="arch-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2A3A4D"/>
    </marker>
  </defs>

  <!-- ── Row 1: apps/server ─────────────────────────────────────────────── -->
  <rect x="20" y="20" width="760" height="80" rx="8" fill="#141B24" stroke="#E8752A" stroke-width="1.5"/>
  <text x="36" y="38" font-family="JetBrains Mono, monospace" font-size="10" fill="#7D8694" letter-spacing="1">DEPLOYABLE</text>
  <text x="36" y="58" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ECEFF4">apps/server</text>
  <text x="36" y="76" font-family="Inter, sans-serif" font-size="11" fill="#7D8694">Hono HTTP · Mastra instance · env config · mac-cli HTTP client</text>

  <!-- Arrow: apps/server → @nearform/mac -->
  <line x1="400" y1="100" x2="400" y2="138" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>
  <text x="412" y="124" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#7D8694">depends on</text>

  <!-- ── Row 2: @nearform/mac (Host / Preset) ───────────────────────────── -->
  <rect x="20" y="140" width="760" height="80" rx="8" fill="#141B24" stroke="#F0B429" stroke-width="1.5"/>
  <text x="36" y="158" font-family="JetBrains Mono, monospace" font-size="10" fill="#7D8694" letter-spacing="1">HOST · PRESET</text>
  <text x="36" y="178" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ECEFF4">@nearform/mac</text>
  <text x="36" y="196" font-family="Inter, sans-serif" font-size="11" fill="#7D8694">createMacApp() · extension init · topological wiring · router · MCP exports</text>

  <!-- Arrows: @nearform/mac → 3 packages (fan-out) -->
  <line x1="400" y1="220" x2="142" y2="258" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>
  <line x1="400" y1="220" x2="400" y2="258" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>
  <line x1="400" y1="220" x2="658" y2="258" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>

  <!-- ── Row 3: Three packages ──────────────────────────────────────────── -->

  <!-- @nearform/mac-github -->
  <rect x="20" y="260" width="244" height="80" rx="8" fill="#141B24" stroke="#1A7A8A" stroke-width="1.5"/>
  <text x="36" y="278" font-family="JetBrains Mono, monospace" font-size="10" fill="#7D8694" letter-spacing="1">PLATFORM</text>
  <text x="36" y="298" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ECEFF4">@nearform/mac-github</text>
  <text x="36" y="316" font-family="Inter, sans-serif" font-size="11" fill="#7D8694">App auth · tools · webhook · github()</text>

  <!-- @nearform/mac-agent-workflows -->
  <rect x="278" y="260" width="244" height="80" rx="8" fill="#141B24" stroke="#F0B429" stroke-width="1.5"/>
  <text x="294" y="278" font-family="JetBrains Mono, monospace" font-size="10" fill="#7D8694" letter-spacing="1">AGENTS &amp; WORKFLOWS</text>
  <text x="294" y="298" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ECEFF4">mac-agent-workflows</text>
  <text x="294" y="316" font-family="Inter, sans-serif" font-size="11" fill="#7D8694">6 agents · 2 workflows · prompts</text>

  <!-- @nearform/mac-slack -->
  <rect x="536" y="260" width="244" height="80" rx="8" fill="#141B24" stroke="#1A7A8A" stroke-width="1.5"/>
  <text x="552" y="278" font-family="JetBrains Mono, monospace" font-size="10" fill="#7D8694" letter-spacing="1">PLATFORM</text>
  <text x="552" y="298" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ECEFF4">@nearform/mac-slack</text>
  <text x="552" y="316" font-family="Inter, sans-serif" font-size="11" fill="#7D8694">Socket Mode · Slack tools · slack()</text>

  <!-- Arrows: 3 packages → @nearform/mac/core (converge) -->
  <line x1="142" y1="340" x2="398" y2="378" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>
  <line x1="400" y1="340" x2="400" y2="378" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>
  <line x1="658" y1="340" x2="402" y2="378" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>

  <!-- ── Row 4: @nearform/mac/core (Contracts · Sink) ───────────────────── -->
  <rect x="20" y="380" width="760" height="80" rx="8" fill="#141B24" stroke="#1E2A38" stroke-width="1.5"/>
  <text x="36" y="398" font-family="JetBrains Mono, monospace" font-size="10" fill="#7D8694" letter-spacing="1">CONTRACTS · SINK</text>
  <text x="36" y="418" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ECEFF4">@nearform/mac/core</text>
  <text x="36" y="436" font-family="Inter, sans-serif" font-size="11" fill="#7D8694">EventEnvelope · capability types · defineAgent / defineWorkflow · routing contracts</text>

  <!-- Arrow: @nearform/mac/core → @mastra/core -->
  <line x1="400" y1="460" x2="400" y2="478" stroke="#2A3A4D" stroke-width="1.5" marker-end="url(#arch-arrow)"/>

  <!-- ── Row 5: @mastra/core (External Framework) ───────────────────────── -->
  <rect x="20" y="480" width="760" height="65" rx="8" fill="#141B24" stroke="#1E2A38" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="498" font-family="JetBrains Mono, monospace" font-size="10" fill="#7D8694" letter-spacing="1">EXTERNAL FRAMEWORK</text>
  <text x="36" y="518" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ECEFF4">@mastra/core</text>
  <text x="36" y="536" font-family="Inter, sans-serif" font-size="11" fill="#7D8694">Mastra v1 · Agent · Workflow · Tool · Workspace · Store primitives</text>
</svg>
